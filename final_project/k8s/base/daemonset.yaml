apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: host-metrics-exporter
  namespace: default
spec:
  selector:
    matchLabels:
      app: host-metrics-exporter
  template:
    metadata:
      labels:
        app: host-metrics-exporter
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "2112"
    spec:
      hostPID: true
      containers:
      - name: exporter
        image: mgpetrova62/my-go-exporter:v5
        ports:
        - containerPort: 2112
        env:
        - name: HOST_PROC
          value: /host/proc
        - name: HOST_SYS
          value: /host/sys
        - name: HOST_ROOTFS
          value: /host/rootfs
        volumeMounts:
        - name: proc
          mountPath: /host/proc
          readOnly: true
        - name: sys
          mountPath: /host/sys
          readOnly: true
        - name: rootfs
          mountPath: /host/rootfs
          readOnly: true
      volumes:
      - name: proc
        hostPath:
          path: /proc
      - name: sys
        hostPath:
          path: /sys
      - name: rootfs
        hostPath:
          path: /