apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: default
spec:
  podSelector: {}
  policyTypes:
  - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-exporter
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: host-metrics-exporter
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: prometheus-server
    ports:
    - protocol: TCP
      port: 2112
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-ksm
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: kube-state-metrics
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: prometheus-server
    ports:
    - protocol: TCP
      port: 8080