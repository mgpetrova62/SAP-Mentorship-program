name: Deploy Host Metrics Exporter

on:
  push:
    branches:
      - main
    paths:
      - 'final_project/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: final_project
          push: true
          tags: mgpetrova62/my-go-exporter:latest,mgpetrova62/my-go-exporter:${{ github.sha }}
          platforms: linux/amd64

      - name: Install Kubectl
        uses: azure/setup-kubectl@v3

      - name: Set up Kubeconfig base
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_CONTENT }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Get OIDC Token
        uses: actions/github-script@v6
        with:
          script: |
            const token = await core.getIDToken('kyma-cluster');
            core.exportVariable('OIDC_TOKEN', token);

      - name: Update Kubeconfig with Token
        run: |
          CURRENT_CONTEXT=$(kubectl config current-context)
          kubectl config set-credentials github-actions --token=$OIDC_TOKEN
          kubectl config set-context $CURRENT_CONTEXT --user=github-actions

      - name: Deploy with Kustomize
        run: |
          cd final_project/k8s/overlays/production
          kustomize edit set image mgpetrova62/my-go-exporter=mgpetrova62/my-go-exporter:${{ github.sha }}
          kubectl kustomize . | kubectl apply -f -